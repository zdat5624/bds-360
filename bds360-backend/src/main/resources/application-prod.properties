# ===============================
# URL PRODUCTION
# ===============================
backend.project.url=${BACKEND_URL}
frontend.project.url=${FRONTEND_URL}

# ===============================
# DATABASE PRODUCTION
# ===============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ===============================
# SECURITY & API KEY (PRODUCTION)
# ===============================
api.jwt.base64-secret=${JWT_SECRET}
vnp.TmnCode=${VNPAY_TMN_CODE}
